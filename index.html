const getToday=()=>new Date().toISOString().split("T")[0];
const addDays=(dateStr,delta)=>{const d=new Date(dateStr+"T12:00:00");d.setDate(d.getDate()+delta);return d.toISOString().split("T")[0]};
const isEditable=(dateStr,todayStr)=>{if(dateStr>todayStr)return false;const d0=new Date(dateStr+"T12:00:00");const d1=new Date(todayStr+"T12:00:00");const n=Math.round((d1-d0)/86400000);return n>=0&&n<=3};
const formatViewHeaderDate=dateStr=>new Date(dateStr+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}).toUpperCase();
const getLevel=xp=>{for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i])return i+1}return 1};
const getLevelProgress=xp=>{const lv=getLevel(xp);const cur=LEVELS[lv-1]||0;const next=LEVELS[lv]||LEVELS[LEVELS.length-1]+5000;return((xp-cur)/(next-cur))*100};
const getMondayOfWeek=dateStr=>{const d=new Date(dateStr+"T12:00:00");const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);return mon.toISOString().split("T")[0]};

const getWeekDates=(offset=0)=>{
  const dates=[];const today=new Date();const day=today.getDay();
  const diff=today.getDate()-day+(day===0?-6:1);
  const start=new Date(today);start.setDate(diff+offset*7);
  for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);dates.push(d.toISOString().split("T")[0])}
  return dates;
};

const calculateStreak=logs=>{
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(today.getDate()-i);const key=d.toISOString().split("T")[0];
    if(logs[key]&&Object.values(logs[key].habits||{}).some(v=>v))streak++;else if(i>0)break}
  return streak;
};

const getWeeklyCount=(logs,habitId,dateStr)=>{
  const monday=getMondayOfWeek(dateStr);let count=0;
  for(let i=0;i<7;i++){const d=new Date(monday+"T12:00:00");d.setDate(d.getDate()+i);if(logs[d.toISOString().split("T")[0]]?.habits?.[habitId])count++}
  return count;
};

const getMonthCalendarDays=(year,month)=>{
  const firstDay=new Date(year,month,1);const lastDay=new Date(year,month+1,0);
  let startDow=firstDay.getDay()-1;if(startDow<0)startDow=6;
  const cells=[];for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=lastDay.getDate();d++){cells.push(`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`)}
  return cells;
};

const MonthlyCalendar=({logs,totalHabits,todayStr,onSelectDate})=>{
  const today=todayStr;const todayDate=new Date();
  const[calYear,setCalYear]=useState(todayDate.getFullYear());
  const[calMonth,setCalMonth]=useState(todayDate.getMonth());
  const cells=getMonthCalendarDays(calYear,calMonth);
  const canGoBack=calYear>2026||(calYear===2026&&calMonth>2);
  const isCurrentMonth=calYear===todayDate.getFullYear()&&calMonth===todayDate.getMonth();
  const prevMonth=()=>{if(!canGoBack)return;if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11)}else setCalMonth(m=>m-1)};
  const nextMonth=()=>{if(isCurrentMonth)return;if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0)}else setCalMonth(m=>m+1)};
  let activeDays=0,perfectDaysInMonth=0,totalCompleted=0;
  cells.filter(c=>c!==null).forEach(dateStr=>{const log=logs[dateStr];if(log){const ct=Object.values(log.habits||{}).filter(v=>v).length;if(ct>0)activeDays++;if(ct===totalHabits&&totalHabits>0)perfectDaysInMonth++;totalCompleted+=ct}});

  return(
    <div style={{animation:"fadeInUp 0.3s ease"}}>
      <h2 style={st.pageTitle}>CALENDAR</h2>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"16px",marginBottom:"20px"}}>
        <button onClick={prevMonth} style={{...st.wkBtn,opacity:canGoBack?1:0.25,cursor:canGoBack?"pointer":"default"}}>◀</button>
        <div style={{textAlign:"center",minWidth:"160px"}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:"1.4rem",letterSpacing:"3px",color:C.white}}>{MONTH_NAMES[calMonth].toUpperCase()}</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:"0.75rem",letterSpacing:"2px",color:C.gray}}>{calYear}</div>
        </div>
        <button onClick={nextMonth} style={{...st.wkBtn,opacity:isCurrentMonth?0.25:1,cursor:isCurrentMonth?"default":"pointer"}}>▶</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px",marginBottom:"4px",padding:"0 2px"}}>
        {DAY_LABELS.map(d=><div key={d} style={{textAlign:"center",fontSize:"0.55rem",fontFamily:"'Bebas Neue'",letterSpacing:"1.5px",color:C.gray,padding:"4px 0"}}>{d.toUpperCase()}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px",padding:"0 2px",marginBottom:"20px"}}>
        {cells.map((dateStr,idx)=>{
          if(dateStr===null)return <div key={`e-${idx}`}/>;
          const log=logs[dateStr];const completed=log?Object.values(log.habits||{}).filter(v=>v).length:0;
          const pct=totalHabits>0?completed/totalHabits:0;const isToday=dateStr===today;const isFuture=dateStr>today;
          const dayNum=new Date(dateStr+"T12:00:00").getDate();
          const bg=isFuture?"rgba(255,255,255,0.02)":pct===0?"rgba(255,255,255,0.04)":pct<0.4?"rgba(220,20,60,0.2)":pct<0.7?"rgba(220,20,60,0.4)":pct<1?"rgba(220,20,60,0.65)":C.gold;
          const clickable=!isFuture&&onSelectDate;
          return(
            <div key={dateStr} onClick={clickable?()=>onSelectDate(dateStr):undefined} role={clickable?"button":undefined} title={isFuture?"":dateStr+": "+completed+"/"+totalHabits} style={{aspectRatio:"1",borderRadius:"8px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:bg,border:isToday?`2px solid ${C.gold}`:"1px solid rgba(255,255,255,0.04)",boxShadow:pct===1?`0 0 8px ${C.gold}40`:isToday?`0 0 8px ${C.gold}25`:"none",opacity:isFuture?0.3:1,transition:"all 0.2s",cursor:clickable?"pointer":"default"}}>
              <span style={{fontSize:"0.75rem",fontWeight:isToday?700:500,color:pct===1?C.blue:isFuture?"rgba(255,255,255,0.2)":C.white,fontFamily:"'Outfit'"}}>{dayNum}</span>
              {!isFuture&&pct>0&&pct<1&&<span style={{fontSize:"0.45rem",color:C.gray,marginTop:"1px"}}>{completed}/{totalHabits}</span>}
              {pct===1&&!isFuture&&<span style={{fontSize:"0.5rem",marginTop:"1px"}}>⭐</span>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:"10px",marginBottom:"20px",flexWrap:"wrap"}}>
        {[["rgba(255,255,255,0.04)","None"],["rgba(220,20,60,0.2)","Some"],["rgba(220,20,60,0.4)","Half"],["rgba(220,20,60,0.65)","Most"],[C.gold,"All ⭐"]].map(([bg,label])=>(
          <span key={label} style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"0.6rem",color:C.gray}}><span style={{width:"12px",height:"12px",borderRadius:"3px",background:bg,display:"inline-block"}}/> {label}</span>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
        {[{icon:"📅",val:activeDays,lbl:"ACTIVE DAYS"},{icon:"⭐",val:perfectDaysInMonth,lbl:"PERFECT DAYS",gold:perfectDaysInMonth>0},{icon:"✅",val:totalCompleted,lbl:"HABITS DONE"}].map((s,i)=>(
          <div key={i} style={{background:C.cardBg,borderRadius:"10px",padding:"12px 8px",border:`1px solid ${C.cardBorder}`,textAlign:"center"}}>
            <div style={{fontSize:"1.1rem"}}>{s.icon}</div><div style={{fontFamily:"'Bebas Neue'",fontSize:"1.4rem",color:s.gold?C.gold:C.white,margin:"2px 0 1px"}}>{s.val}</div><div style={{fontSize:"0.5rem",letterSpacing:"1.5px",color:C.gray}}>{s.lbl}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

function SupermanApp(){
  const[data,setData]=useState(DEFAULT_DATA);
  const[loaded,setLoaded]=useState(false);
  const[screen,setScreen]=useState("loading");
  const[activeTab,setActiveTab]=useState("daily");
  const[showAddHabit,setShowAddHabit]=useState(false);
  const[newHabitName,setNewHabitName]=useState("");
  const[newHabitIcon,setNewHabitIcon]=useState("✨");
  const[xpPopup,setXpPopup]=useState({visible:false,amount:0});
  const[newBadge,setNewBadge]=useState(null);
  const[weekOffset,setWeekOffset]=useState(0);
  const[today,setToday]=useState(getToday());
  const[viewedDate,setViewedDate]=useState(getToday());
  const touchStartX=useRef(null);

  useEffect(()=>{
    const saved=loadData();
    if(saved){
      const existingIds=saved.habits.map(h=>h.id);
      const missing=PRESET_HABITS.filter(p=>!existingIds.includes(p.id));
      if(missing.length>0)saved.habits=[...saved.habits.filter(h=>!h.isPreset),...PRESET_HABITS];
      setData(saved);setScreen("splash");
    }else{setScreen("onboarding")}
    setLoaded(true);
  },[]);

  useEffect(()=>{if(loaded&&screen==="app")saveData(data)},[data,loaded,screen]);

  useEffect(()=>{
    const id=setInterval(()=>{
      const n=getToday();
      setToday(prev=>{if(n===prev)return prev;setViewedDate(v=>v===prev?n:v);return n});
    },60000);
    return()=>clearInterval(id);
  },[]);

  const viewedLog=data.logs[viewedDate]||{habits:{}};
  const dayEditable=isEditable(viewedDate,today);
  const ringLabel=viewedDate===today?"TODAY":new Date(viewedDate+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase();

  const onDailyTouchStart=e=>{touchStartX.current=e.changedTouches[0].clientX};
  const onDailyTouchEnd=e=>{
    if(touchStartX.current==null)return;
    const dx=e.changedTouches[0].clientX-touchStartX.current;
    touchStartX.current=null;
    if(Math.abs(dx)<50)return;
    if(dx<0)setViewedDate(v=>addDays(v,-1));
    else setViewedDate(v=>v>=today?v:addDays(v,1));
  };
  const currentStreak=calculateStreak(data.logs);
  const level=getLevel(data.totalXP);
  const levelProgress=getLevelProgress(data.totalXP);
  const dailyHabits=data.habits.filter(h=>h.type!=="weekly");
  const weeklyHabits=data.habits.filter(h=>h.type==="weekly");

  const perfectDays=Object.values(data.logs).filter(log=>{const c=Object.values(log.habits||{}).filter(v=>v).length;return c===data.habits.length&&data.habits.length>0}).length;

  const countWeeksHit=(habitId,target)=>{let count=0;const checked=new Set();Object.keys(data.logs).forEach(dateStr=>{const mon=getMondayOfWeek(dateStr);if(!checked.has(mon)){checked.add(mon);if(getWeeklyCount(data.logs,habitId,dateStr)>=target)count++}});return count};

  const profileStats={totalXP:data.totalXP,currentStreak,level,perfectDays,daysCompleted:Object.keys(data.logs).filter(k=>Object.values(data.logs[k]?.habits||{}).some(v=>v)).length,customHabits:data.habits.filter(h=>!h.isPreset).length,gymWeeksHit:countWeeksHit("gym",2),walkWeeksHit:countWeeksHit("walk",2)};

  const checkBadges=useCallback(stats=>{for(const badge of BADGES){if(!data.earnedBadges.includes(badge.id)&&badge.condition(stats)){setData(prev=>({...prev,earnedBadges:[...prev.earnedBadges,badge.id]}));setNewBadge(badge);setTimeout(()=>setNewBadge(null),3000);return}}},[data.earnedBadges]);
  useEffect(()=>{if(loaded&&screen==="app")checkBadges(profileStats)},[data.totalXP,data.logs,loaded,screen]);

  const toggleHabit=habitId=>{
    if(!isEditable(viewedDate,today))return;
    const wasChecked=viewedLog.habits[habitId];const xpChange=wasChecked?-XP_PER_HABIT:XP_PER_HABIT;
    if(!wasChecked){setXpPopup({visible:true,amount:XP_PER_HABIT});setTimeout(()=>setXpPopup({visible:false,amount:0}),1200)}
    setData(prev=>{const cur=prev.logs[viewedDate]||{habits:{}};const newLogs={...prev.logs};newLogs[viewedDate]={...cur,habits:{...cur.habits,[habitId]:!wasChecked}};return{...prev,logs:newLogs,totalXP:Math.max(0,prev.totalXP+xpChange)}});
  };

  const addCustomHabit=()=>{if(!newHabitName.trim())return;setData(prev=>({...prev,habits:[...prev.habits,{id:`custom_${Date.now()}`,name:newHabitName.trim(),icon:newHabitIcon,desc:"Custom goal",type:"daily",isPreset:false}]}));setNewHabitName("");setNewHabitIcon("✨");setShowAddHabit(false)};
  const removeCustomHabit=id=>setData(prev=>({...prev,habits:prev.habits.filter(h=>h.id!==id)}));

  const completedToday=Object.values(viewedLog.habits).filter(v=>v).length;
  const totalHabits=data.habits.length;
  const dayPercent=totalHabits>0?(completedToday/totalHabits)*100:0;

  if(screen==="loading")return null;
  if(screen==="onboarding")return <OnboardingPage onStart={()=>setScreen("splash")}/>;
  if(screen==="splash")return <SplashPage onEnter={()=>setScreen("app")} streak={currentStreak} level={level}/>;

  const NAV_TABS=[{id:"daily",icon:"🦸",label:"TODAY"},{id:"stats",icon:"📊",label:"STATS"},{id:"calendar",icon:"📅",label:"CAL"},{id:"badges",icon:"🏅",label:"BADGES"},{id:"links",icon:"🔗",label:"LINKS"}];

  return(
    <div style={st.app}>
      <XPPopup xp={xpPopup.amount} visible={xpPopup.visible}/>
      {newBadge&&<div style={st.badgeNotif}><div style={{fontSize:"2rem"}}>{newBadge.icon}</div><div><div style={{fontSize:"0.7rem",color:C.gold,letterSpacing:"2px",fontFamily:"'Bebas Neue'"}}>BADGE UNLOCKED</div><div style={{fontSize:"1rem",fontWeight:700}}>{newBadge.name}</div></div></div>}

      <header style={st.header}>
        <div style={st.headerTop}>
          <div style={{flex:1,minWidth:0}}>
            {viewedDate===today?(
              <><div style={st.greeting}>{new Date().getHours()<12?"GOOD MORNING":new Date().getHours()<17?"GOOD AFTERNOON":"GOOD EVENING"}</div><h1 style={st.heroName}>SUPERMAN</h1></>
            ):(
              <><div style={st.greeting}>VIEWING</div><h1 style={{...st.heroName,fontSize:"1.45rem",lineHeight:1.15,marginBottom:"6px"}}>{formatViewHeaderDate(viewedDate)}</h1>

            )}
          </div>
          <div style={st.streakBox}><span style={{fontSize:"1.2rem"}}>🔥</span><span style={st.streakNum}>{currentStreak}</span><span style={st.streakLbl}>DAY{currentStreak!==1?"S":""}</span></div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}><span style={st.levelText}>LEVEL {level}</span><span style={st.xpText}>{data.totalXP} XP</span></div>
        <div style={st.progOuter}><div style={{...st.progInner,width:`${levelProgress}%`}}/></div>
        <div style={st.levelNext}>{LEVELS[level]?`${LEVELS[level]-data.totalXP} XP to Level ${level+1}`:"MAX LEVEL"}</div>
      </header>

      <main style={st.main}>
        {activeTab==="daily"&&(
          <div onTouchStart={onDailyTouchStart} onTouchEnd={onDailyTouchEnd} style={{animation:"fadeInUp 0.3s ease",touchAction:"pan-y"}}>
            <div style={st.ringWrap}>
              <svg width="110" height="110" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/><circle cx="60" cy="60" r="52" fill="none" stroke={dayPercent===100?C.gold:C.red} strokeWidth="8" strokeLinecap="round" strokeDasharray={`${dayPercent*3.267} 326.7`} transform="rotate(-90 60 60)" style={{transition:"stroke-dasharray 0.6s ease,stroke 0.3s ease",filter:dayPercent===100?`drop-shadow(0 0 8px ${C.gold})`:"none"}}/><text x="60" y="55" textAnchor="middle" fill={C.white} fontSize="24" fontWeight="700" fontFamily="'Bebas Neue'">{completedToday}/{totalHabits}</text><text x="60" y="72" textAnchor="middle" fill={C.gray} fontSize="10" fontFamily="'Outfit'">{ringLabel}</text></svg>
              {dayPercent===100&&<div style={st.perfectText}>⭐ PERFECT DAY ⭐</div>}
            </div>
            <div style={st.secLabel}>DAILY MISSIONS</div>
            <div style={st.hList}>
              {dailyHabits.map(habit=>{const checked=viewedLog.habits[habit.id]||false;const rowOp=dayEditable?1:!checked?0.72:0.78;return(
                <div key={habit.id} onClick={dayEditable?()=>toggleHabit(habit.id):undefined} style={{...st.hCard,borderColor:checked?C.gold:C.cardBorder,background:checked?"rgba(255,215,0,0.07)":C.cardBg,cursor:dayEditable?"pointer":"default",opacity:rowOp}}>
                  <div style={st.hLeft}><span style={{fontSize:"1.5rem",opacity:dayEditable?1:0.85}}>{habit.icon}</span><div><div style={{fontSize:"0.85rem",fontWeight:600,color:checked?C.gold:C.white,transition:"color 0.2s",opacity:!dayEditable&&checked?0.5:1}}>{habit.name}{checked&&!dayEditable&&<span style={{marginLeft:"6px",opacity:0.55}}>✓</span>}</div><div style={{fontSize:"0.65rem",color:C.gray,marginTop:"1px"}}>{habit.desc}</div></div></div>
                  <div style={st.hRight}><div style={{...st.xpTag,opacity:dayEditable?1:0.55}}>+{XP_PER_HABIT}</div>{dayEditable?<div style={{...st.chk,borderColor:checked?C.gold:C.gray,background:checked?C.gold:"transparent"}}>{checked&&<span style={{color:C.blue,fontSize:"0.9rem",fontWeight:900}}>✓</span>}</div>:<div style={{...st.chk,borderColor:checked?`${C.gold}66`:`${C.gray}55`,background:checked?`${C.gold}35`:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem"}}>🔒</div>}</div>
                  {!habit.isPreset&&viewedDate===today&&<button onClick={e=>{e.stopPropagation();removeCustomHabit(habit.id)}} style={st.rmBtn}>×</button>}
                </div>
              )})}
            </div>
            <div style={st.secLabel}>WEEKLY MISSIONS</div>
            <div style={st.hList}>
              {weeklyHabits.map(habit=>{const checked=todayLog.habits[habit.id]||false;const weekCount=getWeeklyCount(data.logs,habit.id,today);const target=habit.weeklyTarget||2;const hit=weekCount>=target;return(
                <div key={habit.id} onClick={()=>toggleHabit(habit.id)} style={{...st.hCard,borderColor:checked?C.gold:hit?"rgba(255,215,0,0.4)":C.cardBorder,background:checked?"rgba(255,215,0,0.07)":hit?"rgba(255,215,0,0.03)":C.cardBg}}>
                  <div style={st.hLeft}><span style={{fontSize:"1.5rem"}}>{habit.icon}</span><div>

                    <div style={{display:"flex",alignItems:"center",gap:"4px",marginTop:"5px"}}>

                      <span style={{fontSize:"0.6rem",color:hit?C.gold:C.gray,marginLeft:"4px",fontWeight:600}}>{weekCount}/{target} this week {hit?"✓":""}</span>
                    </div>
                  </div></div>
                  <div style={st.hRight}><div style={st.xpTag}>+{XP_PER_HABIT}</div><div style={{...st.chk,borderColor:checked?C.gold:C.gray,background:checked?C.gold:"transparent"}}>{checked&&<span style={{color:C.blue,fontSize:"0.9rem",fontWeight:900}}>✓</span>}</div></div>
                </div>
              )})}
            </div>
            {!showAddHabit?<button onClick={()=>setShowAddHabit(true)} style={st.addBtn}>+ ADD CUSTOM HABIT</button>:(
              <div style={st.addForm}>
                <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{["✨","🎯","📚","🏃","🧘","💊","🎵","🖊️","🌱","❤️"].map(e=><button key={e} onClick={()=>setNewHabitIcon(e)} style={{width:"34px",height:"34px",borderRadius:"8px",background:"rgba(255,255,255,0.05)",fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",border:newHabitIcon===e?`2px solid ${C.gold}`:"2px solid transparent"}}>{e}</button>)}</div>

                <div style={{display:"flex",gap:"8px"}}><button onClick={addCustomHabit} style={{flex:1,padding:"10px",borderRadius:"8px",border:"none",background:C.red,color:"#fff",fontFamily:"'Bebas Neue'",fontSize:"0.85rem",letterSpacing:"2px",cursor:"pointer"}}>ADD</button><button onClick={()=>{setShowAddHabit(false);setNewHabitName("")}} style={{flex:1,padding:"10px",borderRadius:"8px",border:`1px solid ${C.gray}40`,background:"transparent",color:C.gray,fontFamily:"'Bebas Neue'",fontSize:"0.85rem",letterSpacing:"2px",cursor:"pointer"}}>CANCEL</button></div>
              </div>
            )}
          </div>
        )}

        {activeTab==="stats"&&(
          <div style={{animation:"fadeInUp 0.3s ease"}}>
            <h2 style={st.pageTitle}>WEEKLY REPORT</h2>
            <div style={{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"14px"}}>
              <button onClick={()=>setWeekOffset(w=>w-1)} style={st.wkBtn}>◀</button>
              <span style={st.wkText}>{weekOffset===0?"THIS WEEK":weekOffset===-1?"LAST WEEK":`${Math.abs(weekOffset)} WEEKS AGO`}</span>
              <button onClick={()=>setWeekOffset(w=>Math.min(0,w+1))} style={{...st.wkBtn,opacity:weekOffset>=0?0.3:1}}>▶</button>
            </div>
            <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
              {weeklyHabits.map(h=>{const wDates=getWeekDates(weekOffset);let ct=0;wDates.forEach(d=>{if(data.logs[d]?.habits?.[h.id])ct++});const target=h.weeklyTarget||2;const hit=ct>=target;return(
                <div key={h.id} style={{flex:1,background:hit?"rgba(255,215,0,0.06)":C.cardBg,borderRadius:"10px",padding:"12px 8px",border:`1px solid ${hit?C.gold:C.cardBorder}`,textAlign:"center",transition:"all 0.3s"}}>
                  <span style={{fontSize:"1.3rem"}}>{h.icon}</span><div style={{fontFamily:"'Bebas Neue'",fontSize:"1.4rem",color:hit?C.gold:C.white}}>{ct}/{target}</div>
                  <div style={{fontSize:"0.55rem",color:C.gray,letterSpacing:"1px",textTransform:"uppercase"}}>{h.name}</div>
                  {hit&&<div style={{fontSize:"0.55rem",color:C.gold,fontWeight:700,marginTop:"2px"}}>TARGET HIT ✓</div>}
                </div>
              )})}
            </div>
            <div style={{display:"flex",gap:"5px",justifyContent:"space-between",marginBottom:"20px",padding:"14px",background:"rgba(255,255,255,0.02)",borderRadius:"12px"}}>
              {getWeekDates(weekOffset).map(date=>{const log=data.logs[date];const completed=log?Object.values(log.habits||{}).filter(v=>v).length:0;const pct=totalHabits>0?(completed/totalHabits)*100:0;const isToday=date===today;const dayName=new Date(date+"T12:00:00").toLocaleDateString("en",{weekday:"short"}).toUpperCase();return(
                <div key={date} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",flex:1}}>
                  <div style={{fontSize:"0.65rem",color:C.gray,fontWeight:600}}>{completed}</div>
                  <div style={{width:"100%",height:"70px",borderRadius:"4px",background:"rgba(255,255,255,0.04)",overflow:"hidden",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}><div style={{width:"100%",height:`${Math.max(pct,3)}%`,borderRadius:"4px",transition:"height 0.4s ease",background:pct===100?`linear-gradient(to top,${C.darkGold},${C.gold})`:`linear-gradient(to top,${C.darkRed},${C.red})`}}/></div>
                  <div style={{fontSize:"0.6rem",fontWeight:600,letterSpacing:"1px",color:isToday?C.gold:C.gray}}>{dayName}</div>
                </div>
              )})}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
              {[{label:"TOTAL XP",value:data.totalXP,icon:"⚡"},{label:"LEVEL",value:level,icon:"🦸"},{label:"STREAK",value:`${currentStreak}d`,icon:"🔥"},{label:"PERFECT DAYS",value:perfectDays,icon:"⭐"},{label:"DAYS ACTIVE",value:profileStats.daysCompleted,icon:"📅"},{label:"BADGES",value:`${data.earnedBadges.length}/${BADGES.length}`,icon:"🏅"}].map((s,i)=>(
                <div key={i} style={{background:C.cardBg,borderRadius:"10px",padding:"12px 8px",border:`1px solid ${C.cardBorder}`,textAlign:"center"}}><div style={{fontSize:"1.3rem"}}>{s.icon}</div><div style={{fontFamily:"'Bebas Neue'",fontSize:"1.4rem",color:C.white,margin:"3px 0 1px"}}>{s.value}</div><div style={{fontSize:"0.5rem",letterSpacing:"1.5px",color:C.gray}}>{s.label}</div></div>
              ))}
            </div>
          </div>
        )}

        {activeTab==="calendar"&&<MonthlyCalendar logs={data.logs} totalHabits={totalHabits}/>}

          <div style={{animation:"fadeInUp 0.3s ease"}}>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              {BADGES.map(badge=>{const earned=data.earnedBadges.includes(badge.id);return(

                  <div style={{fontSize:"0.6rem",color:C.gray}}>{badge.desc}</div>

                </div>
              )})}
            </div>
          </div>
        )}

        {activeTab==="links"&&<LinksTab/>}
      </main>

      <nav style={st.nav}>
        {NAV_TABS.map(tab=>(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",background:"none",border:"none",cursor:"pointer",padding:"6px 0",transition:"all 0.2s",color:activeTab===tab.id?C.gold:C.gray,borderTop:activeTab===tab.id?`2px solid ${C.gold}`:"2px solid transparent"}}>
            <span style={{fontSize:"1.15rem"}}>{tab.icon}</span>
            <span style={{fontSize:"0.5rem",fontFamily:"'Bebas Neue'",letterSpacing:"1.5px"}}>{tab.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}
